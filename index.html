<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用下载中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .header { text-align: center; }
        .header h1 { font-size: 32px; color: #1a1a2e; font-weight: 700; margin-bottom: 6px; }
        .header p { color: #666; font-size: 14px; margin-bottom: 12px; }

        .system-badge {
            display: inline-flex;
            align-items: center; gap: 6px;
            background: rgba(74,144,226,0.08);
            color: #4A90E2;
            padding: 6px 16px; border-radius: 20px;
            font-size: 13px; font-weight: 500;
        }
        .system-badge svg { width: 16px; height: 16px; stroke: #4A90E2; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .app-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 22px 20px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03);
            display: flex; align-items: center; gap: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .app-card:hover { transform: translateY(-2px); box-shadow: 0 18px 35px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.05); }

        .app-icon {
            flex-shrink: 0;
            width: 52px; height: 52px;
            background: rgba(74,144,226,0.06);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
        }
        .app-icon svg { width: 30px; height: 30px; stroke: #4A90E2; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

        .app-info { flex: 1; min-width: 0; }
        .app-info h3 { font-size: 17px; color: #1a1a2e; font-weight: 600; margin-bottom: 4px; }
        .app-info .desc { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .download-link {
            flex-shrink: 0;
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg, #4A90E2, #357ABD);
            color: #fff; padding: 10px 18px; border-radius: 30px;
            font-size: 14px; font-weight: 600; text-decoration: none;
            box-shadow: 0 6px 15px rgba(74,144,226,0.25);
            transition: all 0.2s;
        }
        .download-link:hover { background: linear-gradient(135deg, #3f7fd0, #2b6cb0); box-shadow: 0 8px 20px rgba(74,144,226,0.35); }
        .download-link:active { transform: scale(0.96); }
        .download-link svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        @media (max-width: 480px) {
            .header h1 { font-size: 28px; }
            .app-card { padding: 18px 15px; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>📱 应用下载中心</h1>
            <p>自动适配您的设备系统</p>
            <div class="system-badge">
                <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="3" ry="3"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                <span id="systemLabel">正在识别系统...</span>
            </div>
        </div>

        <div class="app-list" id="appList"></div>
    </div>

    <script>
        function detectOS() {
            const ua = navigator.userAgent || '';
            if (/Android/i.test(ua)) return 'Android';
            if (/iPhone|iPad|iPod/i.test(ua)) return 'iOS';
            if (/Macintosh|Mac OS X/i.test(ua)) return 'macOS';
            if (/Windows NT/i.test(ua)) return 'Windows';
            return 'Windows';
        }

        const currentOS = detectOS();
        document.getElementById('systemLabel').textContent = `已为您匹配 ${currentOS} 版本`;

        // 应用列表配置（id 必须和 Download.html 中的 appConfig 一致）
        const apps = [
            {
                id: 'myapp',
                name: 'My Application',
                desc: '主程序，稳定版 v2.0.1',
                icon: 'package'
            },
            {
                id: 'toolbox',
                name: '工具箱 Pro',
                desc: '常用小工具集合 v1.5.0',
                icon: 'tool'
            },
            {
                id: 'helper',
                name: '系统助手',
                desc: '清理优化 v3.2.0',
                icon: 'zap'
            }
        ];

        function getIconSVG(type) {
            const icons = {
                package: `<svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
                tool: `<svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
                zap: `<svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`
            };
            return icons[type] || icons.package;
        }

        const downloadIconSVG = `<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

        const appListEl = document.getElementById('appList');
        apps.forEach(app => {
            const card = document.createElement('div');
            card.className = 'app-card';
            card.innerHTML = `
                <div class="app-icon">${getIconSVG(app.icon)}</div>
                <div class="app-info">
                    <h3>${app.name}</h3>
                    <p class="desc">${app.desc}</p>
                </div>
                <a href="Download.html" class="download-link">
                    ${downloadIconSVG}
                    下载
                </a>
            `;
            appListEl.appendChild(card);
        });
    </script>
</body>
</html>
